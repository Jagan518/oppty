<body>
    <h2>Feedback Form</h2>

<form>
  <label for="name">Name:</label><br>
  <input type="text" id="name" name="name" required><br><br>

  <label for="email">Email:</label><br>
  <input type="email" id="email" name="email" required><br><br>

  <label for="feedback">Your Feedback:</label><br>
  <textarea id="feedback" name="feedback" rows="5" cols="40" required></textarea><br><br>

  <input type="submit" value="Submit">
  <input type="reset" value="Clear">
  <input type="button" value="Extra Elements" onclick="window.location.href='extra elements.html'">
  <input type="button" value="Back to Home" onclick="window.location.href='1Task.html'">
</form>
